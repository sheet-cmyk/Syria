name: flutter_ads_app
description: تطبيق الإعلانات العربي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.4
  google_fonts: ^6.1.0
  geolocator: ^12.0.0
  google_maps_flutter: ^2.9.0
  device_info_plus: ^9.0.0
  http: ^1.2.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  google_sign_in: ^6.2.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  video_player: ^2.11.1
  firebase_messaging: ^15.2.10
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.2.4
  country_picker: ^2.0.26
  share_plus: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.5.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/alarm_icons/
    - assets/icon iraq/
   

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon iraq/icon12.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon iraq/icon12.png"
    background_color: "#FFFFFF"
    theme_color: "#FFD600"
